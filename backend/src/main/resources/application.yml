server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: http://localhost:5173

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      base-url: https://open.bigmodel.cn/api/paas/v4
      model-name: glm-4-flash
      temperature: 0.7
      timeout: 60s
      max-retries: 1
    streaming-chat-model:
      api-key: ${OPENAI_API_KEY}
      base-url: https://open.bigmodel.cn/api/paas/v4
      model-name: glm-4-flash
      temperature: 0.7
      timeout: 60s
      max-retries: 1
